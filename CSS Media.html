<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media query</title>
    <style>
        body {
            background-color: cadetblue;
        }
        @media screen and (orientation: portrait){
            body{
                border: 3px solid purple;
            }
        }

        @media only screen and (max-width:455px) {
            body {
                background-color: green;
            }
        }

        .boxes {

            flex-direction: column;
        }

        .boxes {
            display: flex;
        }

        .box {
            width: 344px;
            height: 344px;
            background-color: steelblue;
            padding: 3px;
            margin: 3px;
        }

        .box {
            text-align: center;

        }

        /* @media not|only mediatype and (expressions){
        CSS Code;} */
    </style>
</head>

<body>
    <div>
        I am a hot girl and wearing a hot red dress
    </div>
    <div class="boxes">
        <div class="box">I'm First BOX</div>
        <div class="box">I'm another BOX</div>
        <div class="box">I'm also a another BOX</div>
    </div>
</body>

</html>
