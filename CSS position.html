<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Position</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        /* box1 are sticky and it will not moved anywhere */
        .box1 {
            background-color: aqua;
            /* z-index: 1;
            position: relative; */
            position: sticky;
            top: 0px;
            height: 111px;
            width: 100%;
            margin: 0%;
            padding: 0px;
        }

        .box2 {
            background-color: bisque;
            /* position: relative;
            top: -48px;
            left: 35px; */
        }

        /* Box3 was a fixed at a position */
        .box3 {
            background-color: azure;
            /* position: fixed;
            bottom: 0%;
            left: 8vw;
            height: 111px; */
        }

        .box4 {
            background-color: blanchedalmond;
            /* z-index: 1;
            position: relative;
            top: -48px;
            left: 34px; */
        }

        .box {
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }


        .parent {
            padding: 43px;
            margin: 30px;
            border: 3px solid purple;
            /* position: absolute; */
            /* Exception:- transfrom , filter, or perspective, properties can also make an element appear as positioned */
            /* transform: translate(0);
            filter: invert(0);
            perspective: 0cm; */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">BOX1</div>
        <div class="box box2">BOX2</div>
        <div class="box box3">BOX3</div>
        <div class="box box4">BOX4</div>
    </div>
</body>

</html>
