<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightslategray;
        }

        .header {
            background-color: cadetblue;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .content {
            background-color: white;
            padding: 30px;
            margin: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)
        }

        .footer {
            background-color: darkgray;
            color: whitesmoke;
            padding: 15px;
            text-align: center;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="header">
        My Website Header
    </div>

    <div class="content">
        <p>This is the content area . You can put your main text, image, or components here.</p>
    </div>

    <div class="footer">
        &copy; 2025 My Website Footer
    </div>
</body>

</html>
