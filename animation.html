<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .container {
            background-color: rgb(12, 132, 60);
            height: 34vh;
            width: 45vw;

        }

        .box {
            width: 34px;
            height: 45px;
            background-color: aquamarine;
            /* animation-name: khushikaAnimation;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0,0,0,0.96);
            animation-delay: 1s;
            /* animation-direction: alternate-reverse; */
            /* animation-play-state: paused; */
            animation: khushikaAnimation 3s ease-in-out 2s 1,
                khushi2 3s ease-in-out 2s 1,


        }

        @keyframes khushikaAnimation {
            from {
                background-color: red;

            }

            to {
                background-color: yellowgreen;
            }
        }

        @keyframes khushi2 {
            0% {
                transform: rotate(100deg);
            }

            20% {
                transform: rotate(200deg);
            }

            50% {
                transform: rotate(220deg);
            }

            80% {
                transform: rotate(300deg);
            }

            100% {
                transform: rotate(360deg);

            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>

</body>

</html>
