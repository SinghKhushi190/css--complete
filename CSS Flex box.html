    <title>CSS-Flexbox</title>
    <style>
        .container {
            border: 3px solid purple;
            display: flex;
            height: 80vh;
            /* justify-content: center; */
            /* when we using align-items its means we have one line element */
            align-items: center;
            /* flex-direction: column; */
            /* flex-direction: row; */
            /* align-content: center; */
            flex-wrap: wrap;
            /* whenwhere we have multiple lines we are using align-content */
            /* align-content: flex-start; */
            /* there is no justify-items in Flexbox */
            flex-flow: row wrap;
            /* row-gap: 30px;
        column-gap: 10px; */
            gap: 40px 10px;
        }

        .item {

            height: 76px;

            background-color: brown;

        }
