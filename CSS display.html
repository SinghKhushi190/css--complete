<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Display</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            border: 2px solid blue;
            display: inline-block;
            padding:45px;  
            width: 234px;

        }
        .box1{
            display: none;
            visibility: hidden;

        }
    </style>
</head>
<body>
    <div class="box">
        I am a Box
    </div>
    <div class="box">
        I have a also a another box
    </div>
    <span>
        We are going to open google 
    </span>
</body>
</html>
