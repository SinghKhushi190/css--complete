<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Shadow & Outline</title>
    <style>
        *{
            margin: 45px;
            padding: 0%;

        }
        .body {
            padding: 34px;
            margin: 0%;
            border: 2px solid black;
            box-shadow: 5px 15px 5px rgb(240, 15, 15);
        }

        .text {
            text-shadow: 2px 2px 4px rgb(0, 29, 87);
            outline: 2px solid black;
            border: 2px solid green;
            outline-offset: 16px;
            border-radius: 1.5px;
        }
    </style>
</head>

<body>
    <div class="body">
        I have a car body
    </div>
    <p class="text">
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Omnis placeat cupiditate fuga voluptatum id at
        aspernatur consequatur quo et! Ea doloribus ullam amet autem dignissimos quos sapiente totam eligendi nobis?
    </p>
</body>

</html>
